<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Dashboard Barber - LUMEN'S STUDIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f8f8f8; color: #1a1a1a; min-height: 100vh; }

    /* ========== HEADER ========== */
    .hdr {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 14px 20px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .hdr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
    }
    .hdr-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hdr-info { flex: 1; margin-left: 10px; }
    .hdr-name { font-size: 0.95rem; font-weight: 800; line-height: 1.2; }
    .hdr-sub  { font-size: 0.7rem; color: #999; margin-top: 1px; }
    .btn-logout {
      font-size: 0.72rem;
      font-weight: 600;
      color: #dc2626;
      border: 1px solid #fecaca;
      background: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ========== PERIOD TABS ========== */
    .period-tabs {
      display: flex;
      gap: 6px;
      padding-bottom: 14px;
    }
    .period-tab {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-align: center;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .period-tab.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    /* ========== STATS ========== */
    .stats-section { padding: 14px 16px 4px; }

    .revenue-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .revenue-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .revenue-num {
      font-size: 1.55rem;
      font-weight: 800;
      color: #16a34a;
    }
    .revenue-sub {
      font-size: 0.7rem;
      color: #999;
      margin-top: 3px;
    }

    /* Rate circle */
    .rate-wrap { text-align: center; }
    .rate-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .rate-circle svg {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }
    .rate-circle svg circle {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
    }
    .rate-circle svg .bg  { stroke: #f0f0f0; }
    .rate-circle svg .fg  { stroke: #16a34a; transition: stroke-dashoffset 0.6s ease; }
    .rate-val {
      font-size: 0.8rem;
      font-weight: 800;
      color: #1a1a1a;
      position: relative;
      z-index: 1;
    }
    .rate-label {
      font-size: 0.62rem;
      color: #999;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 14px 16px;
    }
    .stat-num {
      font-size: 1.55rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-num.green  { color: #16a34a; }
    .stat-num.blue   { color: #2563eb; }
    .stat-num.amber  { color: #d97706; }
    .stat-num.red    { color: #dc2626; }
    .stat-label {
      font-size: 0.67rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 4px;
    }

    /* ========== BOOKING LIST ========== */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 8px;
    }
    .list-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .list-count {
      font-size: 0.72rem;
      color: #999;
    }

    .booking-list {
      padding: 0 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bk-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bk-time {
      font-size: 0.72rem;
      font-weight: 700;
      color: #555;
      background: #f0f0f0;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      min-width: 44px;
      text-align: center;
    }
    .bk-info { flex: 1; min-width: 0; }
    .bk-date {
      font-size: 0.65rem;
      color: #bbb;
      margin-bottom: 1px;
    }
    .bk-name {
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bk-svc {
      font-size: 0.72rem;
      color: #888;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bk-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .bk-badge {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .bk-badge.completed { background: #dcfce7; color: #166534; }
    .bk-badge.confirmed { background: #dbeafe; color: #1e40af; }
    .bk-badge.pending   { background: #fef3c7; color: #92400e; }
    .bk-badge.cancelled { background: #fee2e2; color: #991b1b; }
    .bk-badge.no_show   { background: #f3f4f6; color: #4b5563; }
    .bk-price {
      font-size: 0.78rem;
      font-weight: 700;
      color: #1a1a1a;
    }
    .bk-price.muted { color: #ccc; text-decoration: line-through; }

    /* ========== EMPTY / LOADING ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #ccc;
    }
    .empty-state i { font-size: 2.2rem; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 0.88rem; }

    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ========== ERROR BANNER ========== */
    .error-banner {
      margin: 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.85rem;
      color: #dc2626;
      display: none;
    }
  </style>
</head>
<body>

  <header class="hdr">
    <div class="hdr-top">
      <div style="display:flex;align-items:center;gap:0">
        <div class="hdr-avatar" id="hdr-avatar">?</div>
        <div class="hdr-info">
          <div class="hdr-name" id="hdr-name">—</div>
          <div class="hdr-sub">Dashboard Barber</div>
        </div>
      </div>
      <button class="btn-logout" id="btn-logout">Logout</button>
    </div>
    <div class="period-tabs">
      <button class="period-tab active" data-period="today">Hari Ini</button>
      <button class="period-tab" data-period="week">Minggu Ini</button>
      <button class="period-tab" data-period="month">Bulan Ini</button>
    </div>
  </header>

  <div id="error-banner" class="error-banner"></div>

  <!-- Stats -->
  <div class="stats-section">
    <div class="revenue-card">
      <div>
        <div class="revenue-label">Total Penghasilan</div>
        <div class="revenue-num" id="stat-revenue">Rp 0</div>
        <div class="revenue-sub" id="stat-period-label">Hari ini</div>
      </div>
      <div class="rate-wrap">
        <div class="rate-circle">
          <svg viewBox="0 0 58 58" width="58" height="58">
            <circle class="bg" cx="29" cy="29" r="26"/>
            <circle class="fg" id="rate-arc" cx="29" cy="29" r="26"
              stroke-dasharray="163.4" stroke-dashoffset="163.4"/>
          </svg>
          <span class="rate-val" id="stat-rate">0%</span>
        </div>
        <div class="rate-label">Selesai</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total Booking</div>
      </div>
      <div class="stat-card">
        <div class="stat-num green" id="stat-completed">0</div>
        <div class="stat-label">Selesai</div>
      </div>
      <div class="stat-card">
        <div class="stat-num blue" id="stat-confirmed">0</div>
        <div class="stat-label">Dikonfirmasi</div>
      </div>
      <div class="stat-card">
        <div class="stat-num amber" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
    </div>
  </div>

  <!-- Booking list -->
  <div class="list-header">
    <div class="list-title">Daftar Booking</div>
    <div class="list-count" id="list-count"></div>
  </div>
  <div class="booking-list" id="booking-list">
    <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Memuat...</p></div>
  </div>

  <script src="/js/barber.js"></script>
</body>
</html>
