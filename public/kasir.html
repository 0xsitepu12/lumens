<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Kasir - LUMEN'S STUDIO</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/Assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/Assets/favicon_io/favicon-16x16.png">
  <link rel="icon" href="/Assets/favicon_io/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/Assets/favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f8f8f8; color: #1a1a1a; min-height: 100vh; }

    .kasir-header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .kasir-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kasir-logo { height: 70px; }
    .btn-logout-kasir {
      font-size: 0.75rem;
      font-weight: 600;
      color: #dc2626;
      border: 1px solid #fecaca;
      background: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .kasir-date { font-size: 0.78rem; color: #888; }
    .kasir-tabs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .kasir-tab {
      flex: 1;
      padding: 8px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: #888;
      font-family: inherit;
    }
    .kasir-tab.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    /* ========== WEEK STRIP ========== */
    .kasir-cal {
      padding: 0 20px 8px;
    }
    .kasir-cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .kasir-cal-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: #1a1a1a;
    }
    .kasir-cal-nav {
      display: flex;
      gap: 4px;
    }
    .kasir-cal-nav button {
      width: 24px; height: 24px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      color: #555;
      font-size: 0.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }
    .kasir-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .kasir-cal-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      padding: 6px 2px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }
    .kasir-cal-cell:active { transform: scale(0.95); }
    .kasir-cal-day { font-size: 0.5rem; font-weight: 600; color: #bbb; text-transform: uppercase; }
    .kasir-cal-num { font-size: 0.88rem; font-weight: 700; color: #555; }
    .kasir-cal-cell.today .kasir-cal-num { color: #1a1a1a; }
    .kasir-cal-cell.selected { background: #1a1a1a; border-radius: 8px; }
    .kasir-cal-cell.selected .kasir-cal-day { color: rgba(255,255,255,0.5); }
    .kasir-cal-cell.selected .kasir-cal-num { color: #fff; }

    /* ========== SUMMARY INLINE ========== */
    .kasir-summary {
      display: flex;
      gap: 0;
      margin: 0 20px 8px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      overflow: hidden;
    }
    .summary-card {
      flex: 1;
      padding: 8px 4px;
      text-align: center;
      border-right: 1px solid #f0f0f0;
    }
    .summary-card:last-child { border-right: none; }
    .summary-num {
      font-size: 1rem;
      font-weight: 800;
    }
    .summary-label {
      font-size: 0.5rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 1px;
    }
    .summary-num.pending { color: #d97706; }
    .summary-num.confirmed { color: #2563eb; }
    .summary-num.completed { color: #16a34a; }

    .kasir-omset-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 20px 10px;
      padding: 10px 14px;
      background: #1a1a1a;
      border-radius: 10px;
    }
    .kasir-omset-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .kasir-omset-value {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
    }

    /* ========== BOOKING LIST ========== */
    .kasir-list {
      padding: 0 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .booking-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .booking-info { flex: 1; min-width: 0; }
    .booking-name {
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .booking-detail {
      font-size: 0.68rem;
      color: #888;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .booking-phone {
      font-size: 0.62rem;
      color: #bbb;
      margin-top: 2px;
    }
    .booking-time-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: #555;
      background: #f0f0f0;
      padding: 4px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      min-width: 42px;
      text-align: center;
    }

    .status-btn {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.62rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .status-btn.pending { background: #fef3c7; color: #92400e; }
    .status-btn.confirmed { background: #dbeafe; color: #1e40af; }
    .status-btn.completed { background: #dcfce7; color: #166534; }
    .status-btn.cancelled { background: #fee2e2; color: #991b1b; }

    .status-wrap { position: relative; flex-shrink: 0; }

    .status-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 50;
    }
    .status-overlay.show { display: block; }

    .status-menu {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 8px 8px 24px;
      z-index: 51;
      max-width: 480px;
      margin: 0 auto;
    }
    .status-menu.show { display: block; }
    .status-menu-handle {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 4px;
      margin: 8px auto 16px;
    }
    .status-menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 8px;
    }
    .status-menu-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px 12px;
      border: 1px solid #e5e5e5;
      background: #fff;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 12px;
      font-family: inherit;
    }
    .status-menu-item:active { transform: scale(0.97); }
    .status-menu-item.confirm { color: #2563eb; background: #eff6ff; border-color: #bfdbfe; }
    .status-menu-item.complete { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }
    .status-menu-item.cancel { color: #dc2626; background: #fef2f2; border-color: #fecaca; }
    .status-menu-item.noshow { color: #666; background: #f9fafb; border-color: #e5e7eb; }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #ccc;
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 0.9rem; }

    .auto-refresh {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a1a1a;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .fab-walkin {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0 18px;
      height: 44px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 3px 12px rgba(22,163,74,0.35);
      letter-spacing: 0.2px;
    }
    .fab-walkin:active { transform: scale(0.97); }

    /* Modal walk-in */
    .walkin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 60;
      align-items: flex-end;
      justify-content: center;
    }
    .walkin-overlay.show { display: flex; }

    .walkin-sheet {
      background: #fff;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 8px 20px 32px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    .walkin-handle {
      width: 36px; height: 4px;
      background: #ddd; border-radius: 4px;
      margin: 10px auto 18px;
    }

    .walkin-title {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 18px;
      color: #1a1a1a;
    }

    .walkin-field {
      margin-bottom: 14px;
    }
    .walkin-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .walkin-field input,
    .walkin-field select {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #f9f9f9;
      color: #1a1a1a;
      outline: none;
    }
    .walkin-field input:focus,
    .walkin-field select:focus {
      border-color: #1a1a1a;
      background: #fff;
    }

    .walkin-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .walkin-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 16px 0;
    }

    .walkin-submit {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.2px;
    }
    .walkin-submit:active { transform: scale(0.98); }
    .walkin-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .walkin-error {
      color: #dc2626;
      font-size: 0.8rem;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <header class="kasir-header">
    <div class="kasir-header-top">
      <img src="/Assets/logo1.png" alt="LUMEN'S STUDIO" class="kasir-logo">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="kasir-date" id="kasir-date"></span>
        <button class="btn-logout-kasir" id="btn-test-sound" style="color:#1a1a1a;border-color:#e0e0e0" title="Test notif"><i class="fa-solid fa-volume-high"></i></button>
        <button class="btn-logout-kasir" id="btn-logout-kasir">Logout</button>
      </div>
    </div>
  </header>

  <div class="kasir-cal">
    <div class="kasir-cal-header">
      <div class="kasir-cal-nav">
        <button id="kcal-prev"><i class="fa-solid fa-chevron-left"></i></button>
      </div>
      <div class="kasir-cal-title" id="kcal-title"></div>
      <div class="kasir-cal-nav">
        <button id="kcal-next"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>
    <div class="kasir-cal-grid" id="kcal-grid"></div>
  </div>

  <div class="kasir-summary">
    <div class="summary-card">
      <div class="summary-num" id="sum-total">0</div>
      <div class="summary-label">Total</div>
    </div>
    <div class="summary-card">
      <div class="summary-num pending" id="sum-pending">0</div>
      <div class="summary-label">Pending</div>
    </div>
    <div class="summary-card">
      <div class="summary-num completed" id="sum-completed">0</div>
      <div class="summary-label">Selesai</div>
    </div>
  </div>

  <div class="kasir-omset-bar">
    <span class="kasir-omset-label">Omset Hari Ini</span>
    <span class="kasir-omset-value" id="sum-omset">Rp 0</span>
  </div>

  <div class="kasir-list" id="booking-list">
    <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Memuat...</p></div>
  </div>

  <!-- Status Bottom Sheet -->
  <div class="status-overlay" id="status-overlay"></div>
  <div class="status-menu" id="status-sheet">
    <div class="status-menu-handle"></div>
    <div class="status-menu-grid" id="status-actions"></div>
  </div>

  <button class="auto-refresh" id="btn-refresh" title="Refresh">
    <i class="fa-solid fa-rotate"></i>
  </button>

  <button class="fab-walkin" id="btn-walkin">
    <i class="fa-solid fa-plus"></i> Walk-in
  </button>

  <!-- Modal Walk-in Booking -->
  <div class="walkin-overlay" id="walkin-overlay">
    <div class="walkin-sheet">
      <div class="walkin-handle"></div>
      <div class="walkin-title"><i class="fa-solid fa-person-walking-arrow-right"></i> Booking Walk-in</div>

      <div class="walkin-field">
        <label>Nama Tamu</label>
        <input type="text" id="wi-name" placeholder="Nama tamu (kosongkan → Tamu Umum)">
      </div>
      <div class="walkin-field">
        <label>No. HP</label>
        <input type="tel" id="wi-phone" placeholder="08... (opsional)" inputmode="tel">
      </div>

      <hr class="walkin-divider">

      <div class="walkin-field">
        <label>Layanan <span style="color:#dc2626">*</span></label>
        <select id="wi-service">
          <option value="">— Pilih Layanan —</option>
        </select>
      </div>
      <div class="walkin-field">
        <label>Stylist <span style="color:#dc2626">*</span></label>
        <select id="wi-barber">
          <option value="">— Pilih Stylist —</option>
        </select>
      </div>

      <div class="walkin-field">
        <label>Tanggal <span style="color:#dc2626">*</span></label>
        <input type="date" id="wi-date">
      </div>
      <div class="walkin-field">
        <label>Jam Layanan <span style="color:#dc2626">*</span></label>
        <input type="time" id="wi-time" style="width:100%;padding:11px 14px;border:1px solid #e0e0e0;border-radius:10px;font-size:0.9rem;font-family:inherit;background:#f9f9f9;color:#1a1a1a;outline:none">
      </div>

      <p class="walkin-error" id="wi-error"></p>

      <button class="walkin-submit" id="wi-submit">
        <i class="fa-solid fa-check"></i> Buat Booking
      </button>
    </div>
  </div>

  <script src="/js/kasir.js"></script>
</body>
</html>
